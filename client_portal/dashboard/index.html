<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riverkeepers Water Quality Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="dashboard-sidebar" aria-label="Primary navigation">
        <div class="sidebar-header">
          <a class="wordmark" href="/dashboard" aria-label="Riverkeepers dashboard home">
            <span class="wordmark__icon" aria-hidden="true">
              <svg viewBox="0 0 32 32" role="img" focusable="false">
                <path
                  d="M4 10.5c2.2-2 4.5-3 7.1-3 3 0 4.5 1.6 6.8 1.6 2.1 0 3.8-.9 5.6-2.6"
                />
                <path
                  d="M4 16c2.2-2 4.5-3 7.1-3 3 0 4.5 1.6 6.8 1.6 2.1 0 3.8-.9 5.6-2.6"
                />
                <path
                  d="M4 21.5c2.2-2 4.5-3 7.1-3 3 0 4.5 1.6 6.8 1.6 2.1 0 3.8-.9 5.6-2.6"
                />
              </svg>
            </span>
            <span class="wordmark__text">Riverkeepers</span>
          </a>
        </div>

        <nav class="sidebar-nav" aria-label="Dashboard sections">
          <a class="sidebar-link is-active" href="/dashboard" aria-current="page">
            <span class="sidebar-link__icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" role="img" focusable="false">
                <path d="M3 4.5h14M3 10h14M3 15.5h14" />
              </svg>
            </span>
            <span>Overview</span>
          </a>
          <button class="sidebar-link" type="button" aria-label="Monitoring Sites">
            <span class="sidebar-link__icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" role="img" focusable="false">
                <path d="M10 3.5 15.5 6v8L10 16.5 4.5 14V6Z" />
                <path d="M10 3.5v13M4.5 6 10 8.5 15.5 6" />
              </svg>
            </span>
            <span>Monitoring Sites</span>
          </button>
          <button class="sidebar-link" type="button" aria-label="Alerts">
            <span class="sidebar-link__icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" role="img" focusable="false">
                <path d="M10 3.5 16 15H4Z" />
                <path d="M10 7.2v3.9M10 13.3h.01" />
              </svg>
            </span>
            <span>Alerts</span>
          </button>
          <button class="sidebar-link" type="button" aria-label="Reports">
            <span class="sidebar-link__icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" role="img" focusable="false">
                <path d="M5 3.5h7l3 3V16.5H5Z" />
                <path d="M12 3.5v3h3M7.5 10h5M7.5 13h5" />
              </svg>
            </span>
            <span>Reports</span>
          </button>
          <button class="sidebar-link" type="button" aria-label="Settings">
            <span class="sidebar-link__icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" role="img" focusable="false">
                <path
                  d="M10 4.6a5.4 5.4 0 1 1 0 10.8A5.4 5.4 0 0 1 10 4.6Zm0-2.1v2.1m0 10.8v2.1M4.6 10H2.5m15 0h-2.1m-8.7-5.4L5.2 3.1m9.6 13.8-1.5-1.5m0-10.8 1.5-1.5M5.2 16.9l1.5-1.5"
                />
              </svg>
            </span>
            <span>Settings</span>
          </button>
        </nav>

        <div class="sidebar-user" aria-label="Signed in user">
          <div class="sidebar-user__identity">
            <span class="sidebar-user__avatar" aria-hidden="true">MC</span>
            <div class="sidebar-user__meta">
              <p class="sidebar-user__name">Maya Chen</p>
              <a class="sidebar-user__signout" href="/">Sign out</a>
            </div>
          </div>
        </div>
      </aside>

      <main class="dashboard-main" aria-label="Water quality dashboard content">
        <h1 class="sr-only">Riverkeepers water quality dashboard</h1>
      </main>
    </div>
  </body>
</html>

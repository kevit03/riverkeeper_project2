<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140" role="img" aria-label="Riverkeeper logo">
  <defs>
    <clipPath id="rk-drop">
      <path d="M60 4
               C42 28 14 56 14 88
               C14 116 34 134 60 134
               C86 134 106 116 106 88
               C106 56 78 28 60 4 Z"/>
    </clipPath>
    <linearGradient id="rk-green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6DC96C"/>
      <stop offset="100%" stop-color="#3FA54A"/>
    </linearGradient>
    <linearGradient id="rk-blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4EC3E3"/>
      <stop offset="100%" stop-color="#1D8DC0"/>
    </linearGradient>
  </defs>

  <!-- Teardrop outline -->
  <path d="M60 4 C42 28 14 56 14 88 C14 116 34 134 60 134 C86 134 106 116 106 88 C106 56 78 28 60 4 Z"
        fill="#FFFFFF"/>

  <g clip-path="url(#rk-drop)">
    <!-- Green land mass (top-left) -->
    <path d="M0 0 H120 V70 C92 60 74 78 54 86 C36 94 22 92 0 88 Z" fill="url(#rk-green)"/>
    <!-- Blue water (bottom-right) -->
    <path d="M0 88 C22 92 36 94 54 86 C74 78 92 60 120 70 V140 H0 Z" fill="url(#rk-blue)"/>
    <!-- River swoosh through the middle -->
    <path d="M0 82 C22 86 36 88 54 80 C74 72 92 54 120 64 L120 78 C92 68 74 86 54 94 C36 102 22 100 0 96 Z"
          fill="#FFFFFF" opacity="0.35"/>

    <!-- Stylized fish -->
    <g transform="translate(56,100)" fill="#FFFFFF">
      <path d="M0 0 C6 -8 20 -10 28 -2 C26 -2 22 0 22 4 C22 8 26 10 28 10 C20 18 6 16 0 8 L-10 14 L-6 4 L-10 -6 Z"/>
      <circle cx="22" cy="2" r="1.8" fill="#1D8DC0"/>
    </g>
  </g>

  <!-- Soft outline ring -->
  <path d="M60 4 C42 28 14 56 14 88 C14 116 34 134 60 134 C86 134 106 116 106 88 C106 56 78 28 60 4 Z"
        fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
</svg>
